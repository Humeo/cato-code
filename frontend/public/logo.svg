<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="catGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>

  <!-- Cat ears -->
  <polygon points="52,85 38,48 72,68" fill="url(#catGrad)"/>
  <polygon points="148,85 162,48 128,68" fill="url(#catGrad)"/>
  <!-- Inner ear -->
  <polygon points="55,80 45,57 68,71" fill="#f0abfc" opacity="0.6"/>
  <polygon points="145,80 155,57 132,71" fill="#f0abfc" opacity="0.6"/>

  <!-- Cat head -->
  <ellipse cx="100" cy="108" rx="58" ry="52" fill="url(#catGrad)"/>

  <!-- Eyes -->
  <ellipse cx="80" cy="100" rx="9" ry="10" fill="#0f0f1a"/>
  <ellipse cx="120" cy="100" rx="9" ry="10" fill="#0f0f1a"/>
  <!-- Pupils (vertical slit) -->
  <ellipse cx="80" cy="100" rx="3.5" ry="8" fill="#1a1a2e"/>
  <ellipse cx="120" cy="100" rx="3.5" ry="8" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="83" cy="96" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="123" cy="96" r="2.5" fill="white" opacity="0.9"/>

  <!-- Nose -->
  <polygon points="100,112 96,118 104,118" fill="#f0abfc"/>

  <!-- Mouth -->
  <path d="M96,118 Q92,124 88,122" stroke="#e9d5ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M104,118 Q108,124 112,122" stroke="#e9d5ff" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="42" y1="110" x2="76" y2="116" stroke="#e9d5ff" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <line x1="40" y1="118" x2="75" y2="120" stroke="#e9d5ff" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <line x1="124" y1="116" x2="158" y2="110" stroke="#e9d5ff" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>
  <line x1="125" y1="120" x2="160" y2="118" stroke="#e9d5ff" stroke-width="1.2" opacity="0.7" stroke-linecap="round"/>

  <!-- Code prompt on forehead -->
  <text x="100" y="90" text-anchor="middle" font-family="monospace" font-size="11" font-weight="bold" fill="#4ade80" filter="url(#glow)" opacity="0.9">&#x276F;_</text>

  <!-- Bottom code brackets -->
  <text x="100" y="172" text-anchor="middle" font-family="monospace" font-size="15" font-weight="bold" fill="#4ade80" filter="url(#glow)" opacity="0.85">&lt;/&gt;</text>
</svg>
